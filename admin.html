<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Hệ Thống Công Đoàn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 min-h-screen flex font-sans">
    
    <div class="w-64 bg-slate-800 text-white flex flex-col min-h-screen">
        <div class="p-4 bg-slate-900 border-b border-slate-700">
            <h2 class="text-xl font-bold">Admin Dashboard</h2>
            <p class="text-xs text-slate-400 mt-1">Năm xét duyệt: 2026</p>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="#" class="block px-4 py-2 bg-blue-600 rounded">Duyệt Hồ Sơ</a>
            <a href="#" class="block px-4 py-2 hover:bg-slate-700 rounded">Quản lý Nhân sự</a>
            <a href="#" class="block px-4 py-2 hover:bg-slate-700 rounded">Cài đặt hệ thống</a>
        </nav>
    </div>

    <div class="flex-1 p-8 h-screen overflow-y-auto">
        <h1 class="text-2xl font-bold text-slate-800 mb-6">Quản Lý Đề Xuất Khen Thưởng / Thăm Hỏi</h1>

        <div class="bg-white p-6 rounded-lg shadow mb-8">
            <h3 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2">📂 Trích xuất dữ liệu Excel (Đã duyệt)</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <button class="bg-green-600 hover:bg-green-700 text-white py-2 px-3 rounded shadow text-sm font-medium flex items-center justify-center">⬇️ Phụ lục 1 (1/6)</button>
                <button class="bg-green-600 hover:bg-green-700 text-white py-2 px-3 rounded shadow text-sm font-medium flex items-center justify-center">⬇️ Phụ lục 2a & 2b</button>
                <button class="bg-green-600 hover:bg-green-700 text-white py-2 px-3 rounded shadow text-sm font-medium flex items-center justify-center">⬇️ Phụ lục 3 (HSG Trường)</button>
                <button class="bg-green-600 hover:bg-green-700 text-white py-2 px-3 rounded shadow text-sm font-medium flex items-center justify-center">⬇️ Phụ lục 3 (HSG TP/QG)</button>
                <button class="bg-green-600 hover:bg-green-700 text-white py-2 px-3 rounded shadow text-sm font-medium flex items-center justify-center">⬇️ Phụ lục 4 (NĐC)</button>
                <button class="bg-emerald-700 hover:bg-emerald-800 text-white py-2 px-3 rounded shadow text-sm font-medium flex items-center justify-center">⬇️ Mẫu 03.1 (Gửi EVN)</button>
                <button class="bg-emerald-700 hover:bg-emerald-800 text-white py-2 px-3 rounded shadow text-sm font-medium flex items-center justify-center">⬇️ Mẫu 03.2 (Gửi EVN)</button>
                <button class="bg-red-600 hover:bg-red-700 text-white py-2 px-3 rounded shadow text-sm font-medium flex items-center justify-center">🖨️ Xuất PDF Trình ký</button>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow overflow-hidden">
            <div class="p-4 border-b flex justify-between items-center bg-slate-50">
                <h3 class="text-lg font-bold text-slate-800">Danh sách hồ sơ</h3>
                <button onclick="loadDanhSachHoSo()" class="bg-blue-100 text-blue-700 px-3 py-1 rounded text-sm hover:bg-blue-200">🔄 Làm mới</button>
            </div>
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-100 text-slate-600 text-sm">
                        <th class="p-3 border-b w-24">MSNV</th>
                        <th class="p-3 border-b">Người nộp (Đơn vị)</th>
                        <th class="p-3 border-b">Hồ sơ / Người thụ hưởng</th>
                        <th class="p-3 border-b text-center">Trạng thái</th>
                        <th class="p-3 border-b text-center">Minh chứng</th>
                        <th class="p-3 border-b text-center">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="danh-sach-ho-so" class="text-sm">
                    <tr>
                        <td colspan="6" class="p-8 text-center text-gray-500">Đang tải dữ liệu...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // --- CẤU HÌNH SUPABASE ---
        const SB_URL = "https://hhmcyscuhwvqgidktdzd.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhobWN5c2N1aHd2cWdpZGt0ZHpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MjgwMDEsImV4cCI6MjA5NTIwNDAwMX0.3yv9mJiwAV0AVBp8aCyo7qOGUCKxKFoX7nuznf9Cbzo";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        // --- KHỞI CHẠY ---
        document.addEventListener('DOMContentLoaded', () => {
            loadDanhSachHoSo();
        });

        // 1. Tải danh sách từ VIEW: vw_tong_hop_ho_so_bao_cao
        async function loadDanhSachHoSo() {
            const tbody = document.getElementById('danh-sach-ho-so');
            tbody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-gray-500">Đang tải dữ liệu...</td></tr>';

            const { data, error } = await supabaseClient
                .from('vw_tong_hop_ho_so_bao_cao')
                .select('*')
                .order('ngay_nop_ho_so', { ascending: false }); // Sắp xếp mới nhất lên đầu

            if (error) {
                console.error("Lỗi tải dữ liệu:", error);
                tbody.innerHTML = `<tr><td colspan="6" class="p-4 text-center text-red-500">Lỗi: ${error.message}</td></tr>`;
                return;
            }

            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-gray-500">Chưa có hồ sơ nào.</td></tr>';
                return;
            }

            tbody.innerHTML = ''; // Xóa thông báo loading

            data.forEach(hs => {
                // Xử lý render danh sách minh chứng (lấy file đầu tiên hoặc hiện nhiều file)
                let linkMinhChung = '<span class="text-gray-400 text-xs">Không có file</span>';
                if (hs.danh_sach_minh_chung && Array.isArray(hs.danh_sach_minh_chung) && hs.danh_sach_minh_chung.length > 0) {
                    // Lọc bỏ các phần tử null sinh ra do LEFT JOIN bị rỗng
                    const validFiles = hs.danh_sach_minh_chung.filter(f => f && f.url);
                    if (validFiles.length > 0) {
                        linkMinhChung = `<a href="${validFiles[0].url}" target="_blank" class="text-blue-500 hover:underline font-medium">Xem File</a>`;
                    }
                }

                // Cấu hình màu cho trạng thái
                let badgeColor = "bg-yellow-100 text-yellow-800"; // Chờ duyệt
                if (hs.trang_thai === 'Đã duyệt') badgeColor = "bg-green-100 text-green-800";
                if (hs.trang_thai === 'Từ chối') badgeColor = "bg-red-100 text-red-800";

                // Người thụ hưởng
                const nguoiThuHuong = hs.ho_ten_con ? `Con: ${hs.ho_ten_con}` : 'Cho bản thân người lao động';

                const tr = `
                    <tr class="hover:bg-slate-50 border-b last:border-b-0">
                        <td class="p-3 font-medium text-gray-800">${hs.msnv || 'N/A'}</td>
                        <td class="p-3">
                            <span class="font-semibold text-gray-800">${hs.ho_ten_nhan_vien}</span><br>
                            <span class="text-xs text-slate-500">${hs.don_vi_cong_tac}</span>
                        </td>
                        <td class="p-3">
                            <span class="font-bold text-blue-700">${hs.loai_ho_so} (${hs.nam_xet_duyet})</span><br>
                            <span class="text-gray-600 text-xs">${nguoiThuHuong}</span>
                            ${hs.chi_tiet_thanh_tich ? `<div class="text-xs text-gray-500 italic mt-1 bg-gray-100 p-1 rounded">"${hs.chi_tiet_thanh_tich}"</div>` : ''}
                        </td>
                        <td class="p-3 text-center">
                            <span class="px-2 py-1 rounded text-xs font-semibold ${badgeColor}">${hs.trang_thai}</span>
                        </td>
                        <td class="p-3 text-center">
                            ${linkMinhChung}
                        </td>
                        <td class="p-3 text-center space-x-1">
                            ${hs.trang_thai === 'Chờ duyệt' ? `
                                <button onclick="capNhatTrangThai('${hs.ho_so_id}', 'Đã duyệt')" class="bg-blue-600 text-white px-3 py-1 rounded text-xs hover:bg-blue-700 shadow-sm">Duyệt</button>
                                <button onclick="capNhatTrangThai('${hs.ho_so_id}', 'Từ chối')" class="bg-slate-300 text-slate-700 px-3 py-1 rounded text-xs hover:bg-slate-400 shadow-sm">Từ chối</button>
                            ` : `
                                <button onclick="capNhatTrangThai('${hs.ho_so_id}', 'Chờ duyệt')" class="bg-gray-100 text-gray-600 border px-2 py-1 rounded text-[10px] hover:bg-gray-200">Hoàn tác</button>
                            `}
                        </td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', tr);
            });
        }

        // 2. Hàm Cập nhật trạng thái duyệt hồ sơ
        async function capNhatTrangThai(hoSoId, trangThaiMoi) {
            if (!confirm(`Bạn có chắc muốn chuyển hồ sơ này sang trạng thái: "${trangThaiMoi}"?`)) return;

            // Update trực tiếp vào bảng gốc ho_so_de_xuat
            const { error } = await supabaseClient
                .from('ho_so_de_xuat')
                .update({ trang_thai: trangThaiMoi, updated_at: new Date().toISOString() })
                .eq('id', hoSoId);

            if (error) {
                alert("Có lỗi xảy ra khi cập nhật: " + error.message);
            } else {
                // Tải lại danh sách sau khi update thành công
                loadDanhSachHoSo();
            }
        }
    </script>
</body>
</html>
